name: Collect & Paper Trade

on:
  schedule:
    # Run every hour for higher-resolution data on short-term contracts
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  collect-and-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need full history for data files and Oracle VM check
          fetch-depth: 0

      - name: Check Oracle VM health
        id: oracle_check
        run: |
          # Check if Oracle VM has auto-committed in the last 30 minutes
          LAST_AUTO=$(git log --oneline --since="30 minutes ago" --grep="auto: trading" | head -1)
          if [ -n "$LAST_AUTO" ]; then
            echo "Oracle VM is active: $LAST_AUTO"
            echo "oracle_active=true" >> $GITHUB_OUTPUT
          else
            echo "Oracle VM inactive, running fallback collection"
            echo "oracle_active=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.12
        if: steps.oracle_check.outputs.oracle_active == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        if: steps.oracle_check.outputs.oracle_active == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        if: steps.oracle_check.outputs.oracle_active == 'false'
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Collect live prices
        if: steps.oracle_check.outputs.oracle_active == 'false'
        run: |
          echo "=== Collecting live prices from 615 matched pairs ==="
          python -m src.live.collector --live-pairs
          echo ""
          echo "=== Collection complete ==="
          # Show what we got
          python -c "
          import pandas as pd
          from pathlib import Path
          p = Path('data/live/bars.parquet')
          if p.exists():
              df = pd.read_parquet(p)
              live = df[df['pair_id'].str.startswith('live_')]
              print(f'Total bars: {len(df)} ({len(live)} live)')
              print(f'Active pairs: {live[\"pair_id\"].nunique()}')
          else:
              print('No bars collected yet')
          "

      - name: Paper trade (Tier 1 + 2 only)
        if: steps.oracle_check.outputs.oracle_active == 'false'
        run: |
          echo "=== Training models and running inference ==="
          python -m src.live.paper_trader --skip-tier3
          echo ""
          echo "=== Paper trading complete ==="

      - name: Show dashboard
        if: steps.oracle_check.outputs.oracle_active == 'false'
        run: |
          python -m src.live.dashboard

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add live data files (unignore them for CI, ignore missing)
          git add -f data/live/bars.parquet 2>/dev/null || true
          git add -f data/live/paper_trades.jsonl 2>/dev/null || true
          git add -f data/live/pair_mapping.json 2>/dev/null || true

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            BARS=$(python -c "
          import pandas as pd
          from pathlib import Path
          p = Path('data/live/bars.parquet')
          if p.exists():
              df = pd.read_parquet(p)
              live = df[df['pair_id'].str.startswith('live_')]
              print(f'{len(live)} bars, {live[\"pair_id\"].nunique()} pairs')
          else:
              print('0 bars')
          " 2>/dev/null || echo "unknown")
            git commit -m "data: live collection ${TIMESTAMP} (${BARS})"
            git push
            echo "Committed and pushed live data"
          fi
# trigger workflow detection
